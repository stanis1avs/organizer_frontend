<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: http://localhost:7000; media-src 'self' blob: http://localhost:7000; connect-src 'self' http://localhost:7000 ws://localhost:7000; object-src 'none'; base-uri 'self';" />
    <title>Organizer</title>
  </head>
  <body>
    <aside
      class="left-aside media"
      aria-hidden="true"
      aria-labelledby="leftAsideTitle"
      id="aiPanel"
    >
      <div class="media_header">
        <h2 id="leftAsideTitle">AI Search</h2>
      </div>
      <div class="media_bodies"></div>
    </aside>

    <section class="chat">
      <div class="chat_header">
        <h1>Saved Messages</h1>
        <div class="asides_wrapper">
          <div class="ws-status" title="Connecting…" aria-label="Connection status" role="status"></div>
          <button
            type="button"
            class="ai-toggle"
            id="aiToggle"
            aria-checked="false"
            aria-label="AI mode"
            title="AI search"
          >
            <span class="ai-track">
              <span class="ai-label" aria-hidden="true">AI</span>
              <span class="ai-knob" aria-hidden="true"></span>
            </span>
          </button>
          <img
            src="img/sidebar.png"
            alt="Shared media"
            class="sidebar"
          />
        </div>
      </div>

      <div class="chat_body">
        <div class="dropplace_container">
          <div class="dropplace"></div>
        </div>

        <div class="pin_mesg">
          <img src="img/pin.png" alt="pin" />
          <div class="pin_content">
            <div class="pin_content_header">Pinned message</div>
            <p class="pin_content_body"></p>
          </div>
          <img src="img/expand.png" alt="Expand" class="expand_pin" />
          <img src="img/close.png" alt="Unpin" class="close_pin" />
        </div>

        <div class="messages"></div>
      </div>

      <div class="chat_footer">
        <ul class="clip_body">
          <li class="clip_body_item clip_audio audio">audio</li>
          <li class="clip_body_item clip_video video">video</li>
          <li class="clip_body_item clip_file file">file</li>
          <li class="clip_body_item clip_geo geo">geo</li>
        </ul>
        <img
          src="img/clip.png"
          alt="Attach"
          class="clip"
        />
        <input
          type="text"
          class="chat_input"
          placeholder="Write a message..."
        />
        <button type="button" class="sending" aria-label="Send">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M3.4 20.4l17.45-7.48a1 1 0 0 0 0-1.84L3.4 3.6a.993.993 0 0 0-1.39.91L2 9.12c0 .5.37.93.87.99L17 12 2.87 13.88c-.5.07-.87.5-.87 1l.01 4.51c0 .71.73 1.2 1.39.91z"/>
          </svg>
        </button>
      </div>
    </section>

    <aside class="media">
      <div class="media_header">
        <h2 class="media_title">Shared media</h2>
        <img
          src="img/close.png"
          alt="Close"
          class="close_media"
        />
      </div>

      <ul class="media_body">
        <li class="media_body_item link"     data-item="links">links<span>0</span></li>
        <li class="media_body_item image"    data-item="images">photos<span>0</span></li>
        <li class="media_body_item video"    data-item="videos">videos<span>0</span></li>
        <li class="media_body_item audio"    data-item="audios">audio<span>0</span></li>
        <li class="media_body_item file"     data-item="files">docs<span>0</span></li>
        <li class="media_body_item favorite" data-item="favorites">favorites<span>0</span></li>
      </ul>
      <div class="media_bodies">
        <div class="media_body_links"     data-item="links"></div>
        <div class="media_body_images"    data-item="images"></div>
        <div class="media_body_videos"    data-item="videos"></div>
        <div class="media_body_audios"    data-item="audios"></div>
        <div class="media_body_files"     data-item="files"></div>
        <div class="media_body_favorites" data-item="favorites"></div>
      </div>
    </aside>
    <div class="panel-overlay" id="panelOverlay" aria-hidden="true"></div>
  </body>
</html>
